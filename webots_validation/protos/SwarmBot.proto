#VRML_SIM R2025a utf8

PROTO SwarmBot [
  field SFVec3f translation 0 0 0.055
  field SFRotation rotation 0 0 1 0
  field SFString name "swarm_bot"
  field MFString controllerArgs []
  field SFColor bodyColor 0.2 0.5 0.9
] {
  Robot {
    translation IS translation
    rotation IS rotation
    name IS name
    controller "swarm_bot"
    controllerArgs IS controllerArgs
    children [
      Receiver {
        name "receiver"
        channel 1
      }
      DEF BODY Shape {
        appearance PBRAppearance {
          baseColor IS bodyColor
          roughness 0.75
          metalness 0
        }
        geometry Box {
          size 0.18 0.10 0.05
        }
      }
      HingeJoint {
        jointParameters HingeJointParameters {
          axis 0 1 0
          anchor 0.055 0.062 0
        }
        device [
          RotationalMotor {
            name "wheel1"
            maxVelocity 12
          }
        ]
        endPoint Solid {
          name "front left wheel"
          translation 0.055 0.062 0
          rotation 1 0 0 1.5708
          children [
            DEF WHEEL Shape {
              appearance PBRAppearance {
                baseColor 0.05 0.05 0.05
                roughness 0.95
                metalness 0
              }
              geometry Cylinder {
                height 0.018
                radius 0.035
                subdivision 24
              }
            }
          ]
          boundingObject USE WHEEL
          physics Physics {
            density -1
            mass 0.035
          }
        }
      }
      HingeJoint {
        jointParameters HingeJointParameters {
          axis 0 1 0
          anchor 0.055 -0.062 0
        }
        device [
          RotationalMotor {
            name "wheel2"
            maxVelocity 12
          }
        ]
        endPoint Solid {
          name "front right wheel"
          translation 0.055 -0.062 0
          rotation 1 0 0 1.5708
          children [
            USE WHEEL
          ]
          boundingObject USE WHEEL
          physics Physics {
            density -1
            mass 0.035
          }
        }
      }
      HingeJoint {
        jointParameters HingeJointParameters {
          axis 0 1 0
          anchor -0.055 0.062 0
        }
        device [
          RotationalMotor {
            name "wheel3"
            maxVelocity 12
          }
        ]
        endPoint Solid {
          name "rear left wheel"
          translation -0.055 0.062 0
          rotation 1 0 0 1.5708
          children [
            USE WHEEL
          ]
          boundingObject USE WHEEL
          physics Physics {
            density -1
            mass 0.035
          }
        }
      }
      HingeJoint {
        jointParameters HingeJointParameters {
          axis 0 1 0
          anchor -0.055 -0.062 0
        }
        device [
          RotationalMotor {
            name "wheel4"
            maxVelocity 12
          }
        ]
        endPoint Solid {
          name "rear right wheel"
          translation -0.055 -0.062 0
          rotation 1 0 0 1.5708
          children [
            USE WHEEL
          ]
          boundingObject USE WHEEL
          physics Physics {
            density -1
            mass 0.035
          }
        }
      }
    ]
    boundingObject USE BODY
    physics Physics {
      density -1
      mass 0.32
    }
  }
}
